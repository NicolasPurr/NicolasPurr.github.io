# ... (permissions and 'on' block stay the same)
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # Point cache to the nested lockfile
          cache-dependency-path: './cv/package-lock.json' 
      - name: Install & Build
        # We must 'cd' into the folder before running commands
        run: |
          cd cv
          npm install
          npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This is the magic line: upload the dist INSIDE cv
          path: ./cv/dist 

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4